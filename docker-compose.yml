# Docker Compose for NL2SQL Thesis Application
# ============================================
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose logs -f        # View logs
#   docker-compose down           # Stop all services
#
# For internet exposure, see docker-compose.expose.yml

version: '3.8'

services:
  # ==========================================================================
  # Backend API
  # ==========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: thesis-backend
    ports:
      - "8000:8000"
    environment:
      # Database connection (use host.docker.internal for local PostgreSQL)
      - DATABASE_HOST=${DATABASE_HOST:-host.docker.internal}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_NAME=${DATABASE_NAME:-Adventureworks}
      - DATABASE_USER=${DATABASE_USER:-postgres}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-}
      # Redis
      - REDIS_HOST=${REDIS_HOST:-host.docker.internal}
      - REDIS_PORT=${REDIS_PORT:-6379}
      # API Keys
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # JWT
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================================
  # Frontend Web App
  # ==========================================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: thesis-frontend
    ports:
      - "3050:3050"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    restart: unless-stopped

  # ==========================================================================
  # Redis (Optional - for caching)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: thesis-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    profiles:
      - with-redis

networks:
  default:
    name: thesis-network
